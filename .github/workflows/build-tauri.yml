name: Build Tauri App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install -g pnpm
      - run: pnpm install
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli
      - run: pnpm tauri build
