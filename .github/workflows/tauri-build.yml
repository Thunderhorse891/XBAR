name: Tauri Build

on:
  workflow_dispatch:

jobs: 
  build:
    runs-on: windows-latest
    env:
      NODE_ENV: production
      RANTIME_ENV: resolve

    steps:
      - name: Checkout code
        uses: actions/checkout@vs
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Run Tauri build
        run: npm run tauri build
      - name: Verify artifacts
        run: ls -al
