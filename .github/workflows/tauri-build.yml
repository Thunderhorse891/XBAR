on:
  workflow_dispatch:

# Rest of workflow defines here...

default_job:
  runs:
    - name: Print Env
      run: echo " RUNNING ENV" && echo "-----------"
      env:
        display_env: true

    - name: Run Setup Tests
      run: cd strc-tauri && npm install
      env:
        NODE_ENV set: "production"
        RANTIME_ENV set: "resolve"
        PATH_FILE : "src-tauri/build.rs"

    - name: Build with TAURI
      run: cd strc-tauri && npm run tauri build