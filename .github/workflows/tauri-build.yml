name: Tauri Build

on:
  workflow_dispatch:

jobs: 
  build:
    runs-on: windows-latest
    env:
      NODE_ENV: production
      RANTIME_ENV: resolve

    steps:
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: npm install
      - name: Run Tauri Build
        run: npm run tauri build
      - name: Check Executables
        run: ls -al