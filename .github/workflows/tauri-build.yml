name: Tauri Build

on:
  workflow_dispatch:

jobs:  
  build:
    runs-on: windows-latest
    env:
      NODE_ENV: production
      RUNTIME_ENV: resolve

    steps: 
      - name: Checkout Repo
        uses: actions/checkout@3

      - name: Setup & Install Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install
        working-directory: ./xbar-horse-management-app

      - name: Run Tauri Build
        run: npm run tauri build
        working-directory: ./xbar-horse-management-app

      - name: Check Executables
        run: ls -al
        working-directory: ./xbar-horse-management-app
