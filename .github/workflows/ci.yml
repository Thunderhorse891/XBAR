name: ci

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Production smoke test (built dist)
        run: npm run test:prod-smoke

      - name: Upload smoke test traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
